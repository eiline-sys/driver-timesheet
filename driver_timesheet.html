<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Timesheet — Storge Petroleum</title>
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
    --text: #1a1a18; --muted: #6b6a64; --accent: #c8420a;
    --accent-light: #fdf0eb; --green: #2d7a3a; --green-light: #edf7ee;
    --amber: #a85e00; --amber-light: #fef6e8; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--text); color: #fff; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 14px; font-weight: normal; letter-spacing: 0.08em; text-transform: uppercase; }
  .sign-btn { font-size: 12px; padding: 5px 14px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: #fff; font-family: inherit; }
  .sign-btn:hover { background: rgba(255,255,255,0.1); }
  .sign-btn.out { border-color: #c8420a; color: #ff8060; }
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); padding: 2rem; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3rem 2.5rem; text-align: center; max-width: 400px; width: 100%; }
  .login-card .logo { font-size: 36px; margin-bottom: 1.5rem; }
  .login-card h2 { font-size: 20px; margin-bottom: 0.5rem; font-weight: normal; }
  .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 2rem; font-family: sans-serif; line-height: 1.6; }
  .btn-ms { display: inline-flex; align-items: center; gap: 10px; background: #0078d4; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: sans-serif; width: 100%; justify-content: center; }
  .btn-ms:hover { background: #006bbf; }
  .btn-ms:disabled { opacity: 0.6; cursor: not-allowed; }
  .app { display: none; }
  .app.visible { display: block; }
  .tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 2rem; overflow-x: auto; }
  .tab { padding: 14px 20px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: bold; }
  .content { padding: 2rem; max-width: 900px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 12px; font-weight: bold; margin-bottom: 1.25rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; font-family: sans-serif; }
  .metric-value { font-size: 22px; font-weight: bold; color: var(--text); }
  .metric-value.ot { color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 120px; gap: 1rem; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-family: sans-serif; }
  input[type="time"], input[type="number"], input[type="date"], select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: var(--bg); color: var(--text); font-family: inherit; width: 100%; }
  .btn { padding: 9px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .btn-primary { background: var(--text); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #333; }
  .btn-danger { border-color: var(--accent); color: var(--accent); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: sans-serif; font-weight: bold; }
  .badge-ot { background: var(--amber-light); color: var(--amber); }
  .badge-reg { background: var(--green-light); color: var(--green); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: sans-serif; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: normal; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr.weekend { opacity: 0.4; }
  .pb-wrap { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); font-family: sans-serif; }
  .pb-bg { background: var(--bg); border-radius: 4px; height: 6px; width: 100px; }
  .pb-fill { height: 6px; border-radius: 4px; background: var(--green); }
  .pb-fill.ot { background: var(--accent); }
  .payroll-driver { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .pd-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--text); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: sans-serif; flex-shrink: 0; }
  .alert { padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 1.25rem; font-family: sans-serif; border-left: 3px solid; }
  .alert-warn { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }
  .alert-info { background: #e8f4fd; color: #1a5f8a; border-color: #1a5f8a; }
  .alert-success { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .status-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 2rem; font-size: 12px; color: var(--muted); font-family: sans-serif; display: flex; align-items: center; gap: 8px; position: fixed; bottom: 0; left: 0; right: 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.saving { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.saved { background: var(--green); }
  .status-dot.error { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .select-row { display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .select-row .form-group { min-width: 160px; }
  .total-row td { font-weight: bold; border-top: 2px solid var(--border) !important; }
  #user-info { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<header>
  <h1>Storge Petroleum — Driver Timesheet</h1>
  <div id="user-info">
    <span id="user-name"></span>
    <button class="sign-btn" id="auth-btn" onclick="handleAuth()">Sign in with Microsoft</button>
  </div>
</header>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="logo">⛽</div>
    <h2>Driver Timesheet</h2>
    <p>Sign in with your Storge Petroleum Microsoft 365 account to access and save timesheet data.</p>
    <button class="btn-ms" id="signin-btn" onclick="handleAuth()">
      <svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
    <p id="loading-msg" style="margin-top:1rem;font-size:12px;color:var(--muted)">Loading authentication...</p>
  </div>
</div>

<div id="app" class="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('entry',this)">Daily Entry</button>
    <button class="tab" onclick="showTab('weekly',this)">Weekly View</button>
    <button class="tab" onclick="showTab('monthly',this)">Month to Date</button>
    <button class="tab" onclick="showTab('payroll',this)">Payroll Summary</button>
  </div>
  <div class="content">
    <div id="sec-entry" class="section active">
      <div class="card">
        <div class="card-title">Log hours</div>
        <div class="select-row">
          <div class="form-group"><label>Driver</label><select id="sel-driver" onchange="loadEntry()"><option>Isaac</option><option>Jason</option></select></div>
          <div class="form-group"><label>Date</label><input type="date" id="sel-date" onchange="loadEntry()"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Start time</label><input type="time" id="inp-start" value="07:00" oninput="calcHours()"></div>
          <div class="form-group"><label>End time</label><input type="time" id="inp-end" value="17:00" oninput="calcHours()"></div>
          <div class="form-group"><label>Break (min)</label><input type="number" id="inp-break" value="30" min="0" max="180" oninput="calcHours()"></div>
          <div class="form-group"><label>Hours worked</label><div style="padding:9px 0;font-size:20px;font-weight:bold" id="day-total">9.5</div></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:1.25rem;align-items:center">
          <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
          <button class="btn btn-danger" onclick="clearEntry()">Clear</button>
          <span id="save-msg" style="font-size:12px;color:var(--green);font-family:sans-serif;display:none">✓ Saved to OneDrive</span>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Today</div><div class="metric-value" id="m-today">—</div></div>
        <div class="metric"><div class="metric-label">Week total</div><div class="metric-value" id="m-week">—</div></div>
        <div class="metric"><div class="metric-label">Overtime</div><div class="metric-value ot" id="m-ot">—</div></div>
        <div class="metric"><div class="metric-label">Status</div><div class="metric-value" id="m-status" style="font-size:14px;padding-top:4px">—</div></div>
      </div>
    </div>
    <div id="sec-weekly" class="section">
      <div class="select-row">
        <div class="form-group"><label>Driver</label><select id="sel-dw" onchange="renderWeekly()"><option>Isaac</option><option>Jason</option></select></div>
        <div class="form-group"><label>Week</label><input type="week" id="sel-week" onchange="renderWeekly()"></div>
      </div>
      <div class="card"><table id="weekly-tbl"></table></div>
    </div>
    <div id="sec-monthly" class="section">
      <div class="select-row">
        <div class="form-group"><label>Driver</label><select id="sel-dm" onchange="renderMonthly()"><option>Isaac</option><option>Jason</option></select></div>
      </div>
      <div class="metrics" id="monthly-metrics"></div>
      <div class="card" id="monthly-card"></div>
    </div>
    <div id="sec-payroll" class="section">
      <div id="payroll-alert"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px">
        <h2 style="font-size:16px;font-weight:bold" id="payroll-heading">Payroll Summary</h2>
        <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
      </div>
      <div id="payroll-cards"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Loading...</span>
</div>

<script>
const CLIENT_ID = 'e02fe79c-452e-42b9-ad84-41ec7478e1a4';
const TENANT_ID = '8f25ab77-33af-4cf1-857d-e32612d18156';
const SCOPES = ['User.Read', 'Files.ReadWrite'];
const DATA_FILE = 'timesheet_data.json';
const OT = 45;
const DRIVERS = ['Isaac', 'Jason'];

let msalInstance = null;
let account = null;
let entries = {};
let isSaving = false;
let msalReady = false;

function setStatus(text, type) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

function loadMsalScript() {
  return new Promise(function(resolve, reject) {
    if (typeof msal !== 'undefined') { resolve(); return; }
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js';
    script.onload = function() {
      var check = setInterval(function() {
        if (typeof msal !== 'undefined' && msal.PublicClientApplication) {
          clearInterval(check);
          resolve();
        }
      }, 100);
      setTimeout(function() { clearInterval(check); reject(new Error('MSAL timeout')); }, 10000);
    };
    script.onerror = function() { reject(new Error('Failed to load MSAL script')); };
    document.head.appendChild(script);
  });
}

async function initApp() {
  setStatus('Loading authentication library...', '');
  document.getElementById('signin-btn').disabled = true;
  try {
    await loadMsalScript();
    const config = {
      auth: {
        clientId: CLIENT_ID,
        authority: 'https://login.microsoftonline.com/' + TENANT_ID,
        redirectUri: window.location.href.split('?')[0].split('#')[0]
      },
      cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: true }
    };
    msalInstance = new msal.PublicClientApplication(config);
    await msalInstance.initialize();
    const resp = await msalInstance.handleRedirectPromise();
    if (resp && resp.account) {
      account = resp.account;
    } else {
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) account = accounts[0];
    }
    msalReady = true;
    document.getElementById('signin-btn').disabled = false;
    document.getElementById('loading-msg').textContent = 'Ready — click below to sign in';
    setStatus('Ready to sign in', 'saved');
    if (account) await onSignedIn();
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Error loading auth: ' + e.message + ' — please refresh';
    document.getElementById('signin-btn').disabled = false;
    setStatus('Auth error — try refreshing', 'error');
  }
}

async function handleAuth() {
  if (!msalReady) { alert('Authentication is still loading. Please wait a moment and try again.'); return; }
  if (account) { signOut(); return; }
  try {
    document.getElementById('signin-btn').disabled = true;
    document.getElementById('loading-msg').textContent = 'Opening Microsoft sign-in...';
    const resp = await msalInstance.loginPopup({ scopes: SCOPES, prompt: 'select_account' });
    account = resp.account;
    await onSignedIn();
  } catch(e) {
    if (e.errorCode === 'popup_window_error' || e.errorCode === 'empty_window_error') {
      setStatus('Popup blocked — trying redirect...', 'saving');
      try {
        await msalInstance.loginRedirect({ scopes: SCOPES });
      } catch(e2) {
        setStatus('Sign-in failed: ' + e2.message, 'error');
        document.getElementById('loading-msg').textContent = 'Sign-in failed. Please allow popups and try again.';
      }
    } else if (e.errorCode !== 'user_cancelled') {
      setStatus('Sign-in failed: ' + e.message, 'error');
      document.getElementById('loading-msg').textContent = 'Error: ' + e.message;
    }
    document.getElementById('signin-btn').disabled = false;
  }
}

function signOut() {
  if (msalInstance && account) msalInstance.logoutPopup({ account: account });
  account = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-name').textContent = '';
  document.getElementById('auth-btn').textContent = 'Sign in with Microsoft';
  document.getElementById('auth-btn').classList.remove('out');
  setStatus('Signed out', '');
}

async function getToken() {
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: account });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
}

async function onSignedIn() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name').textContent = account.name || account.username;
  document.getElementById('auth-btn').textContent = 'Sign out';
  document.getElementById('auth-btn').classList.add('out');
  setStatus('Loading data from OneDrive...', 'saving');
  await loadFromOneDrive();
  initUI();
}

async function loadFromOneDrive() {
  try {
    const token = await getToken();
    const res = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/' + DATA_FILE + ':/content', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.ok) {
      entries = await res.json();
      setStatus('Data loaded from OneDrive ✓', 'saved');
    } else if (res.status === 404) {
      entries = {};
      setStatus('New file — ready to start', 'saved');
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(e) {
    setStatus('Could not load data: ' + e.message, 'error');
  }
}

async function saveToOneDrive() {
  if (isSaving) return;
  isSaving = true;
  setStatus('Saving to OneDrive...', 'saving');
  try {
    const token = await getToken();
    const res = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/' + DATA_FILE + ':/content', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(entries)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setStatus('Saved to OneDrive ✓', 'saved');
    var msg = document.getElementById('save-msg');
    msg.style.display = 'inline';
    setTimeout(function() { msg.style.display = 'none'; }, 3000);
  } catch(e) {
    setStatus('Save failed: ' + e.message, 'error');
  } finally { isSaving = false; }
}

function ekey(d, date) { return d + '||' + date; }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function addDays(ds, n) { var d = new Date(ds); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0]; }
function getWeekStart(ds) {
  var d = new Date(ds), dow = d.getDay(), m = new Date(d);
  m.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return m.toISOString().split('T')[0];
}
function getWeekNum(ds) {
  var d = new Date(ds), j = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - j) / 86400000) + j.getDay() + 1) / 7);
}
function getWeekHours(driver, ws) {
  var t = 0;
  for (var i = 0; i < 7; i++) { var e = entries[ekey(driver, addDays(ws, i))]; if (e) t += e.hours; }
  return Math.round(t * 10) / 10;
}

function calcHours() {
  var s = document.getElementById('inp-start').value;
  var e = document.getElementById('inp-end').value;
  var b = parseInt(document.getElementById('inp-break').value) || 0;
  if (!s || !e) { document.getElementById('day-total').textContent = '—'; return 0; }
  var sh = parseInt(s.split(':')[0]), sm = parseInt(s.split(':')[1]);
  var eh = parseInt(e.split(':')[0]), em = parseInt(e.split(':')[1]);
  var hrs = Math.max(0, Math.round(((eh * 60 + em) - (sh * 60 + sm) - b) / 60 * 10) / 10);
  document.getElementById('day-total').textContent = hrs || '—';
  return hrs;
}

function loadEntry() {
  var driver = document.getElementById('sel-driver').value;
  var date = document.getElementById('sel-date').value;
  var e = entries[ekey(driver, date)];
  document.getElementById('inp-start').value = e ? e.start : '07:00';
  document.getElementById('inp-end').value = e ? e.end : '17:00';
  document.getElementById('inp-break').value = e ? e.breakMin : 30;
  updateMetrics(driver, date, calcHours());
}

function updateMetrics(driver, date, todayHrs) {
  var ws = getWeekStart(date);
  var wh = getWeekHours(driver, ws);
  var ot = Math.max(0, wh - OT);
  document.getElementById('m-today').textContent = todayHrs ? todayHrs + ' hrs' : '—';
  document.getElementById('m-week').textContent = wh ? wh + ' hrs' : '—';
  document.getElementById('m-ot').textContent = ot.toFixed(1) + ' hrs';
  document.getElementById('m-status').innerHTML = ot > 0 ? '<span class="badge badge-ot">Overtime</span>' : '<span class="badge badge-reg">Regular</span>';
}

async function saveEntry() {
  var driver = document.getElementById('sel-driver').value;
  var date = document.getElementById('sel-date').value;
  var hrs = calcHours();
  entries[ekey(driver, date)] = {
    start: document.getElementById('inp-start').value,
    end: document.getElementById('inp-end').value,
    breakMin: parseInt(document.getElementById('inp-break').value) || 0,
    hours: hrs
  };
  updateMetrics(driver, date, hrs);
  await saveToOneDrive();
}

async function clearEntry() {
  var driver = document.getElementById('sel-driver').value;
  var date = document.getElementById('sel-date').value;
  delete entries[ekey(driver, date)];
  loadEntry();
  await saveToOneDrive();
}

function renderWeekly() {
  var driver = document.getElementById('sel-dw').value;
  var wv = document.getElementById('sel-week').value;
  if (!wv) return;
  var parts = wv.split('-W'), yr = parts[0], wk = parseInt(parts[1]);
  var jan1 = new Date(yr, 0, 1);
  var ws = new Date(jan1);
  ws.setDate(jan1.getDate() + (wk - 1) * 7 - (jan1.getDay() || 7) + 1);
  var wsStr = ws.toISOString().split('T')[0];
  var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var html = '<thead><tr><th>Day</th><th>Start</th><th>End</th><th>Break</th><th>Hours</th><th></th></tr></thead><tbody>';
  var total = 0;
  for (var i = 0; i < 7; i++) {
    var ds = addDays(wsStr, i);
    var d = new Date(ds);
    var e = entries[ekey(driver, ds)];
    var hrs = e ? e.hours : 0;
    total += hrs;
    html += '<tr class="' + (i >= 5 ? 'weekend' : '') + '"><td>' + days[i] + ' ' + d.getDate() + '/' + (d.getMonth()+1) + '</td><td>' + (e ? e.start : '—') + '</td><td>' + (e ? e.end : '—') + '</td><td>' + (e ? e.breakMin + 'm' : '—') + '</td><td><strong>' + (hrs || '—') + '</strong></td><td></td></tr>';
  }
  total = Math.round(total * 10) / 10;
  var ot = Math.max(0, total - OT);
  var pct = Math.min(total / OT * 100, 100);
  html += '<tr class="total-row"><td colspan="4">Total</td><td>' + total + ' hrs</td><td>' + (ot > 0 ? '<span class="badge badge-ot">+' + ot.toFixed(1) + ' OT</span>' : '<span class="badge badge-reg">No OT</span>') + '</td></tr>';
  html += '<tr><td colspan="6" style="padding-top:8px"><div class="pb-wrap"><div class="pb-bg"><div class="pb-fill ' + (ot > 0 ? 'ot' : '') + '" style="width:' + pct.toFixed(1) + '%"></div></div><span>' + total + ' / ' + OT + ' hrs</span></div></td></tr></tbody>';
  document.getElementById('weekly-tbl').innerHTML = html;
}

function renderMonthly() {
  var driver = document.getElementById('sel-dm').value;
  var now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
  var totalHrs = 0, totalOT = 0, weekMap = {};
  for (var d = 1; d <= now.getDate(); d++) {
    var ds = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var e = entries[ekey(driver, ds)];
    if (e && e.hours > 0) {
      totalHrs += e.hours;
      var wn = getWeekNum(ds);
      if (!weekMap[wn]) weekMap[wn] = 0;
      weekMap[wn] += e.hours;
    }
  }
  totalHrs = Math.round(totalHrs * 10) / 10;
  Object.keys(weekMap).forEach(function(k) { weekMap[k] = Math.round(weekMap[k]*10)/10; totalOT += Math.max(0, weekMap[k] - OT); });
  totalOT = Math.round(totalOT * 10) / 10;
  var reg = Math.round(Math.max(0, totalHrs - totalOT) * 10) / 10;
  document.getElementById('monthly-metrics').innerHTML = '<div class="metric"><div class="metric-label">Total hours MTD</div><div class="metric-value">' + totalHrs + '</div></div><div class="metric"><div class="metric-label">Regular hours</div><div class="metric-value">' + reg + '</div></div><div class="metric"><div class="metric-label">Overtime hours</div><div class="metric-value ot">' + totalOT + '</div></div>';
  var rows = '';
  Object.entries(weekMap).forEach(function(kv) {
    var wot = Math.max(0, kv[1] - OT), pct = Math.min(kv[1] / OT * 100, 100);
    rows += '<tr><td>Week ' + kv[0] + '</td><td>' + kv[1] + ' hrs</td><td>' + (wot > 0 ? '<span class="badge badge-ot">+' + wot.toFixed(1) + ' OT</span>' : '<span class="badge badge-reg">No OT</span>') + '</td><td><div class="pb-wrap"><div class="pb-bg"><div class="pb-fill ' + (wot > 0 ? 'ot' : '') + '" style="width:' + pct.toFixed(1) + '%"></div></div></div></td></tr>';
  });
  document.getElementById('monthly-card').innerHTML = '<div class="card-title">' + now.toLocaleString('default',{month:'long',year:'numeric'}) + ' — week by week</div><table><thead><tr><th>Week</th><th>Hours</th><th>Status</th><th>Load</th></tr></thead><tbody>' + (rows || '<tr><td colspan="4" style="color:var(--muted)">No entries this month yet</td></tr>') + '</tbody></table>';
}

function renderPayroll() {
  var now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
  var lastDay = new Date(yr, mo+1, 0).getDate(), submitDay = lastDay - 1, today = now.getDate();
  var monthName = now.toLocaleString('default', {month:'long', year:'numeric'});
  document.getElementById('payroll-heading').textContent = 'Payroll Summary — ' + monthName;
  var alertDiv = document.getElementById('payroll-alert');
  if (today === submitDay) {
    alertDiv.innerHTML = '<div class="alert alert-warn">⚠ Payroll submission due today. Please review and submit.</div>';
  } else if (today < submitDay && submitDay - today <= 5) {
    alertDiv.innerHTML = '<div class="alert alert-warn">🔔 Payroll due in ' + (submitDay - today) + ' day' + (submitDay-today>1?'s':'') + ' — ' + submitDay + '/' + (mo+1) + '/' + yr + '.</div>';
  } else {
    alertDiv.innerHTML = '<div class="alert alert-info">📅 Next payroll submission: ' + submitDay + ' ' + now.toLocaleString('default',{month:'long'}) + ' ' + yr + '.</div>';
  }
  var html = '';
  DRIVERS.forEach(function(driver) {
    var totalHrs = 0, totalOT = 0, weekMap = {};
    for (var d = 1; d <= today; d++) {
      var ds = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var e = entries[ekey(driver, ds)];
      if (e && e.hours > 0) {
        totalHrs += e.hours;
        var wn = getWeekNum(ds);
        if (!weekMap[wn]) weekMap[wn] = 0;
        weekMap[wn] += e.hours;
      }
    }
    totalHrs = Math.round(totalHrs * 10) / 10;
    Object.values(weekMap).forEach(function(wh) { totalOT += Math.max(0, wh - OT); });
    totalOT = Math.round(totalOT * 10) / 10;
    var reg = Math.round(Math.max(0, totalHrs - totalOT) * 10) / 10;
    var wkH = Object.keys(weekMap).map(function(wn) { return '<th>Wk ' + wn + '</th>'; }).join('');
    var wkV = Object.entries(weekMap).map(function(kv) {
      var wt = Math.round(kv[1]*10)/10, wot = Math.max(0, wt - OT);
      return '<td>' + wt + (wot > 0 ? ' <small style="color:var(--accent)">+' + wot.toFixed(1) + 'OT</small>' : '') + '</td>';
    }).join('');
    html += '<div class="payroll-driver"><div class="pd-head"><div style="display:flex;align-items:center;gap:10px"><div class="avatar">' + driver[0] + '</div><strong>' + driver + '</strong></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="badge badge-reg">' + reg + ' reg hrs</span>' + (totalOT > 0 ? '<span class="badge badge-ot">' + totalOT + ' OT hrs</span>' : '') + '</div></div><table style="font-size:12px"><thead><tr><th>Period</th>' + wkH + '<th>Total</th></tr></thead><tbody><tr><td style="color:var(--muted)">Hours</td>' + wkV + '<td><strong>' + totalHrs + '</strong></td></tr></tbody></table></div>';
  });
  document.getElementById('payroll-cards').innerHTML = html || '<p style="color:var(--muted);font-size:13px">No entries recorded yet.</p>';
}

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
  if (name === 'weekly') renderWeekly();
  if (name === 'monthly') renderMonthly();
  if (name === 'payroll') renderPayroll();
}

function initUI() {
  document.getElementById('sel-date').value = todayStr();
  var now = new Date();
  document.getElementById('sel-week').value = now.getFullYear() + '-W' + String(getWeekNum(todayStr())).padStart(2, '0');
  loadEntry();
}

window.addEventListener('load', initApp);
</script>
</body>
</html>
